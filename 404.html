<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=/index.html?redirect=%2F" />
    <script>
      // Obtiene la ruta solicitada y redirige a index.html con query
      const redirectTo = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace(`/index.html?redirect=${encodeURIComponent(redirectTo)}`);
    </script>
    <title>Redirecting…</title>
  </head>
  <body>
    <p>Redirigiendo a la aplicación…</p>
    <p>
      <a id="link" href="#">Si no se redirige automáticamente, haz clic aquí</a>
    </p>
    <script>
      const link = document.getElementById("link");
      link.href = `/index.html?redirect=${encodeURIComponent(window.location.pathname)}`;
    </script>
  </body>
</html>
